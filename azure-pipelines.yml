trigger: 
- main

resources: 
- repo: self

variables: 
  tag: '$(Build.BuildId)'
  imageName: 'demo-page'

stages:
  - stage: Build
    displayName: Build Image
    jobs:
      - job: Build
        displayName: Build
        pool:
          vmImage: ubuntu-latest

        steps: 
          - task: Docker@2
            displayName: Build an image
            inputs: 
              repository: $(imageName)
              command: build
              dockerfile: '**/Dockerfile'
              tags: $(tag)


