trigger: 
- main

resources: 
- repo: self

variables:
  - group: CICD

parameters: 
  - name: tag
    default: '$(Build.BuildId)'
  - name: imageName
    default: 'demo-page'

stages:
  - stage: CICD
    displayName: CICD workflow
    jobs:
      - job: Build
        displayName: Build
        pool: local-agent
          
        steps: 
          - script: |
              echo 'var=$(appVersion)'
          
          - task: Docker@2
            displayName: Build an image
            inputs: 
              command: build
              repository: ${{ parameters.imageName }}
              dockerfile: '**/Dockerfile'
              tags: ${{ parameters.tag }}
              arguments: '--build-arg VERSION=${{ parameters.tag }}'
              containerRegistry: registryConnection
          
          - task: Docker@2
            displayName: Push to ACR
            inputs:
              command: push
              containerRegistry: registryConnection
              repository: ${{ parameters.imageName }}
              tags: ${{ parameters.tag }}

      - job: Deploy
        displayName: Deploy
        dependsOn: Build
        pool: local-agent
        steps:
          - task: AzureContainerApps@1

            inputs:
              azureSubscription: appdeployconnection
              imageToDeploy: acrappscarlos.azurecr.io/${{ parameters.imageName }}:${{ parameters.tag }}
              containerAppName: app-demo-page
              resourceGroup: kube

              acrUsername: $(acrUsername)
              acrPassword: $(acrPassword)

